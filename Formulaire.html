<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire Personnalisé</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    label { 
      color: #2ecc71;  /* ← Couleur des labels (VERT) */
      font-weight: bold;
      display: block;
      margin: 10px 0 5px;
    }
    input, select, textarea { 
      color: #333333;    /* ← Couleur du texte saisi */
      background: #ffffff;
      padding: 8px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: #2ecc71;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 15px;
    }
    button:hover { background: #27ae60; }
  </style>
</head>
<body>
  <form id="monFormulaire">
    <label for="nom">Nom :</label>
    <input type="text" id="nom" name="nom" required>

    <label for="dispositif">Dispositif :</label>
    <select id="dispositif" name="dispositif">
      <option value="true">Actif</option>
      <option value="false">Hors dispositif</option>
    </select>

    <label for="effectifs">Effectifs :</label>
    <input type="number" id="effectifs" name="effectifs" required>

    <button type="submit">Envoyer</button>
  </form>

  <script>
    if (typeof grist !== 'undefined') {
      grist.ready({ columns: [] });

      document.getElementById('monFormulaire').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
          Nom: document.getElementById('nom').value,
          Dispositif: document.getElementById('dispositif').value === 'true',
          Effectifs: parseInt(document.getElementById('effectifs').value)
        };

        grist.docApi.applyUserActions([ ['AddRecord', 'VotreTable', null, data] ]);
        
        alert('Données envoyées !');
        this.reset();
      });
    }
  </script>
</body>
</html>
